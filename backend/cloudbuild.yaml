steps:
  # 1. Build the container image using your Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "${_DOCKERFILE_PATH:-Dockerfile}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "${_BUILD_CONTEXT:-.}"

  # 2. Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"

  # 3. Deploy to Cloud Run (direct image, no invalid ${IMAGE} var)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "SPRING_DATASOURCE_URL=${_SPRING_DATASOURCE_URL},SPRING_DATASOURCE_USERNAME=${_SPRING_DATASOURCE_USERNAME},SPRING_DATASOURCE_PASSWORD=${_SPRING_DATASOURCE_PASSWORD},JWT_SECRET=${_JWT_SECRET},APP_FRONTEND_BASE_URL=${_APP_FRONTEND_BASE_URL}"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"

# Required because trigger uses a custom service account
options:
  logging: "CLOUD_LOGGING_ONLY"

substitutions:
  _REGION: "us-central1"
  _REPO_NAME: "lms-backend-repo"
  _SERVICE_NAME: "learnhub-backend"
  _DOCKERFILE_PATH: "Dockerfile"   # change only if your Dockerfile is in a folder
  _BUILD_CONTEXT: "."              # change only if your backend folder is not root
  _SPRING_DATASOURCE_URL: "jdbc:mysql://YOUR_DB:3306/lms_elearn_db?useSSL=true&serverTimezone=UTC"
  _SPRING_DATASOURCE_USERNAME: "lms_user"
  _SPRING_DATASOURCE_PASSWORD: "lms_password"
  _JWT_SECRET: "your-secret"
  _APP_FRONTEND_BASE_URL: "your-frontend-url"
