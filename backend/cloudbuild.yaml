# # options:
# #   default_logs_bucket_behavior: "REGIONAL_USER_OWNED_BUCKET"
# #
# # Option C: Explicitly set a logs bucket (you must create the bucket first and give Cloud Build access)
# # logsBucket: "projects/PROJECT_ID/locations/REGION/buckets/BUCKET_ID"

