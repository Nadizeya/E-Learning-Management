# # === FIX for the service-account / logging requirement ===
# # Option A (used here): send logs to Cloud Logging only (CLOUD_LOGGING_ONLY).
# # This is the simplest fix and satisfies the requirement when a build.service_account is used.
# options:
#   logging: "CLOUD_LOGGING_ONLY"

# # --- Alternative fixes (pick one instead of the above options.logging) ---
