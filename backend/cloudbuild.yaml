# cloudbuild.yaml - corrected: do NOT use shell-style ${VAR:-default} in substitution templates
steps:
  # 1. Build the container image using your Dockerfile (explicit substitution variables)
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-f"
      - "${_DOCKERFILE_PATH}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"
      - "${_BUILD_CONTEXT}"

  # 2. Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy "${_SERVICE_NAME}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "SPRING_DATASOURCE_URL=${_SPRING_DATASOURCE_URL},SPRING_DATASOURCE_USERNAME=${_SPRING_DATASOURCE_USERNAME},SPRING_DATASOURCE_PASSWORD=${_SPRING_DATASOURCE_PASSWORD},JWT_SECRET=${_JWT_SECRET},APP_FRONTEND_BASE_URL=${_APP_FRONTEND_BASE_URL}"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA"

# Required when using a custom service account for builds
options:
  logging: "CLOUD_LOGGING_ONLY"

# IMPORTANT: define explicit substitutions (no bash defaults in step args)
substitutions:
  _REGION: "us-central1"
  _REPO_NAME: "lms-backend-repo"
  _SERVICE_NAME: "learnhub-backend"

  # <-- Set these explicitly. Use "backend/Dockerfile" and "backend" for backend builds.
  _DOCKERFILE_PATH: "backend/Dockerfile"   # path to your Dockerfile relative to repo root
  _BUILD_CONTEXT: "backend"                # build context directory, e.g. "." or "backend"

  # App env values (override in trigger if needed)
  _SPRING_DATASOURCE_URL: "jdbc:mysql://YOUR_DB:3306/lms_elearn_db?useSSL=true&serverTimezone=UTC"
  _SPRING_DATASOURCE_USERNAME: "lms_user"
  _SPRING_DATASOURCE_PASSWORD: "lms_password"
  _JWT_SECRET: "your-secret"
  _APP_FRONTEND_BASE_URL: "your-frontend-url"
